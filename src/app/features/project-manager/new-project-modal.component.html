<ink-modal [title]="'MODAL.TITLE' | transloco" (closed)="cancelled.emit()">
  <div class="flex flex-col gap-4">
    <!-- Nombre -->
    <div class="flex flex-col gap-1.5">
      <label
        class="text-ink-subtle text-xs font-medium uppercase tracking-wide"
      >
        {{ 'MODAL.NAME_LABEL' | transloco }}
      </label>
      <input
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        [placeholder]="'MODAL.NAME_PLACEHOLDER' | transloco"
        maxlength="80"
        class="w-full px-3 py-2 rounded bg-ink-bg border border-ink-border text-ink-text text-sm placeholder:text-ink-muted focus:outline-none focus:border-ink-accent transition-colors"
      />
    </div>

    <!-- Descripción -->
    <div class="flex flex-col gap-1.5">
      <label
        class="text-ink-subtle text-xs font-medium uppercase tracking-wide"
      >
        {{ 'MODAL.DESC_LABEL' | transloco }} <span class="normal-case">{{ 'MODAL.OPTIONAL' | transloco }}</span>
      </label>
      <textarea
        [(ngModel)]="description"
        [placeholder]="'MODAL.DESC_PLACEHOLDER' | transloco"
        rows="3"
        maxlength="300"
        class="w-full px-3 py-2 rounded bg-ink-bg border border-ink-border text-ink-text text-sm placeholder:text-ink-muted resize-none focus:outline-none focus:border-ink-accent transition-colors"
      >
      </textarea>
    </div>

    <!-- Carpeta elegida -->
    <div class="flex flex-col gap-1.5">
      <label
        class="text-ink-subtle text-xs font-medium uppercase tracking-wide"
      >
        {{ 'MODAL.FOLDER_LABEL' | transloco }}
      </label>
      <div class="flex gap-2">
        <div
          class="flex-1 px-3 py-2 rounded bg-ink-bg border border-ink-border text-sm truncate"
          [class]="folderPath() ? 'text-ink-text' : 'text-ink-muted'"
        >
          {{ folderPath() || ('MODAL.NO_FOLDER' | transloco) }}
        </div>
        <ink-button variant="secondary" (clicked)="selectFolder()">
          {{ 'MODAL.CHOOSE' | transloco }}
        </ink-button>
      </div>
      @if (fullPath()) {
        <p class="text-ink-subtle text-xs mt-1">
          {{ 'MODAL.WILL_CREATE_IN' | transloco }}
          <span class="text-ink-text font-mono">{{ fullPath() }}</span>
        </p>
      }
    </div>

    <!-- Error -->
    @if (error()) {
      <p class="text-ink-danger text-xs">{{ error() }}</p>
    }
  </div>

  <!-- Acciones -->
  <ng-container slot="actions">
    <ink-button variant="ghost" (clicked)="cancelled.emit()">
      {{ 'MODAL.CANCEL' | transloco }}
    </ink-button>
    <ink-button
      variant="primary"
      [disabled]="!canCreate()"
      [loading]="creating()"
      (clicked)="create()"
    >
      {{ 'MODAL.CREATE' | transloco }}
    </ink-button>
  </ng-container>
</ink-modal>
