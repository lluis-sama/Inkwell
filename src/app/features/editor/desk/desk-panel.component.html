<div
  class="h-full w-full bg-ink-surface border-ink-border flex flex-col overflow-hidden shadow-[0_-2px_12px_0_rgba(0,0,0,0.08)] dark:shadow-[0_-2px_12px_0_rgba(0,0,0,0.18)]"
  [class.border-t]="position() === 'bottom'"
  [class.border-r]="position() === 'left'"
  [class.border-l]="position() === 'right'"
>
  <div
    #resizeHandle
    class="absolute z-10 transition-colors duration-150 bg-transparent hover:bg-ink-accent/25 active:bg-ink-accent/50"
    [class]="resizeHandleClass()"
  ></div>

  <div class="flex items-center h-9 shrink-0 px-2 border-b border-ink-border gap-1">
    <span class="text-xs font-semibold text-ink-subtle flex-1 select-none">El Cajón</span>

    <button
      (click)="pinLeft()"
      class="w-6 h-6 flex items-center justify-center rounded hover:bg-ink-overlay text-ink-subtle hover:text-ink-text transition-colors"
      title="Anclar a la izquierda"
    >
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="4" height="12" rx="1" fill="currentColor"/>
        <rect x="7" y="1" width="6" height="2" rx="0.5" fill="currentColor" opacity="0.5"/>
        <rect x="7" y="6" width="6" height="2" rx="0.5" fill="currentColor" opacity="0.5"/>
        <rect x="7" y="11" width="6" height="2" rx="0.5" fill="currentColor" opacity="0.5"/>
      </svg>
    </button>

    <button
      (click)="pinBottom()"
      class="w-6 h-6 flex items-center justify-center rounded hover:bg-ink-overlay text-ink-subtle hover:text-ink-text transition-colors"
      title="Anclar abajo"
    >
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="9" width="12" height="4" rx="1" fill="currentColor"/>
        <rect x="1" y="1" width="2" height="6" rx="0.5" fill="currentColor" opacity="0.5"/>
        <rect x="6" y="1" width="2" height="6" rx="0.5" fill="currentColor" opacity="0.5"/>
        <rect x="11" y="1" width="2" height="6" rx="0.5" fill="currentColor" opacity="0.5"/>
      </svg>
    </button>

    <button
      (click)="pinRight()"
      class="w-6 h-6 flex items-center justify-center rounded hover:bg-ink-overlay text-ink-subtle hover:text-ink-text transition-colors"
      title="Anclar a la derecha"
    >
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="9" y="1" width="4" height="12" rx="1" fill="currentColor"/>
        <rect x="1" y="1" width="6" height="2" rx="0.5" fill="currentColor" opacity="0.5"/>
        <rect x="1" y="6" width="6" height="2" rx="0.5" fill="currentColor" opacity="0.5"/>
        <rect x="1" y="11" width="6" height="2" rx="0.5" fill="currentColor" opacity="0.5"/>
      </svg>
    </button>

    <button
      (click)="close()"
      class="w-6 h-6 flex items-center justify-center rounded hover:bg-ink-overlay text-ink-subtle hover:text-ink-text transition-colors"
      title="Cerrar"
    >
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 2L12 12M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="flex flex-1 overflow-hidden">
    <div class="w-[180px] shrink-0 border-r border-ink-border overflow-hidden">
      <ink-desk-binder
        [tree]="deskTree()"
        [activeId]="activeDocId()"
        (documentSelected)="activeDocId.set($event)"
        (treeChanged)="loadDeskTree()"
      />
    </div>

    <div class="flex-1 overflow-hidden">
      @if (activeDocId()) {
        <app-tiptap-editor
          [content]="activeDocContent()"
          [placeholder]="'Escribe tu nota...'"
          [compact]="true"
          (contentChanged)="onContentChanged($event)"
        />
      } @else {
        <div class="flex items-center justify-center h-full text-ink-muted text-sm select-none">
          Selecciona o crea una nota
        </div>
      }
    </div>
  </div>
</div>
