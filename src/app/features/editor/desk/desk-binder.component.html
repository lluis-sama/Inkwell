<div class="flex flex-col h-full bg-ink-panel border-r border-ink-border">
  <!-- Toolbar -->
  <div class="flex items-center justify-between px-3 py-3 border-b border-ink-border shrink-0">
    <span class="text-ink-subtle text-xs font-medium uppercase tracking-widest">
      {{ 'DESK.BINDER_TITLE' | transloco }}
    </span>
    <div class="flex gap-1">
      <!-- Nuevo documento -->
      <button
        (click)="newDocument()"
        [title]="'DESK.NEW_NOTE' | transloco"
        class="p-1 rounded text-ink-subtle hover:text-ink-text hover:bg-ink-border transition-colors">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
      </button>
      <!-- Nueva carpeta -->
      <button
        (click)="newFolder()"
        title="Nueva carpeta"
        class="p-1 rounded text-ink-subtle hover:text-ink-text hover:bg-ink-border transition-colors">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Lista de nodos -->
  <div class="flex-1 overflow-y-auto py-2 px-1">
    @if (tree().length === 0) {
      <p class="text-ink-subtle text-xs text-center mt-8 px-4 leading-relaxed">
        {{ 'DESK.EMPTY_STATE' | transloco }}
      </p>
    } @else {
      @for (node of tree(); track node.id) {
        <app-binder-node
          [node]="node"
          [depth]="0"
          [activeId]="activeId()"
          [renamingId]="renamingId()"
          [statusFilter]="null"
          (nodeClicked)="onNodeClicked($event)"
          (contextMenu)="onContextMenu($event)"
          (renamed)="onRenamed($event)"
          (renameCancel)="onRenameCancel()"
          (dragStarted)="onDragStarted($event)"
          (dropped)="onDropped($event)"
        />
      }
    }
  </div>

  <!-- Menú contextual -->
  @if (contextMenuEvent()) {
    <app-binder-context-menu
      [x]="contextMenuEvent()!.x"
      [y]="contextMenuEvent()!.y"
      [actions]="contextActions()"
      (actionSelected)="onContextAction($event)"
    />
  }
</div>
