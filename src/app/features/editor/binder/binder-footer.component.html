<div class="flex items-center justify-between px-3 py-2 border-t border-ink-border bg-ink-panel shrink-0">
  @if (wordCount() === 0) {
    <span class="text-ink-subtle text-xs">{{ 'BINDER.FOOTER.EMPTY' | transloco }}</span>
  } @else if (wordCount() < 1000) {
    <span class="text-ink-subtle text-xs">{{ 'BINDER.FOOTER.WORDS' | transloco: { count: wordCount() } }}</span>
  } @else {
    <span class="text-ink-subtle text-xs">{{ 'BINDER.FOOTER.WORDS_K' | transloco: { count: wordCountK() } }}</span>
  }
  <button
    class="p-1 rounded hover:text-ink-text hover:bg-ink-border transition-colors"
    [class.text-ink-accent]="searchActive()"
    [class.text-ink-subtle]="!searchActive()"
    [title]="'BINDER.FOOTER.SEARCH' | transloco"
    (click)="searchToggled.emit()"
  >
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
  </button>
</div>
