<div
  class="relative w-full h-full overflow-auto bg-ink-bg"
  style="background-image: radial-gradient(var(--ink-border) 1px, transparent 1px); background-size: 24px 24px;"
  (contextmenu)="onCanvasRightClick($event)"
>
  <div #canvasEl class="relative" style="min-width: 3000px; min-height: 2000px;">
    <app-connection-svg-overlay
      [connections]="board().connections"
      [cards]="cardsWithLivePositions()"
      [provisionalConnection]="provisionalConnection()"
      (connectionSelected)="onConnectionSelected($event)"
    />
    @if (selectedConnection()) {
      <app-connection-editor-popover
        [connection]="selectedConnection()!"
        [left]="selectedConnectionLeft()"
        [top]="selectedConnectionTop()"
        (labelChanged)="onConnectionLabelChanged($event)"
        (colorChanged)="onConnectionColorChanged($event)"
        (deleteRequested)="onConnectionDeleteRequested()"
        (closed)="selectedConnection.set(null)"
      />
    }
    @for (card of cardsWithLivePositions(); track card.id) {
      <app-board-card
        [card]="card"
        [attr.data-card-id]="card.id"
        (positionChanged)="onPositionChanged($event)"
        (editRequested)="editRequested.emit($event)"
        (deleteRequested)="deleteRequested.emit($event)"
        (imageRequested)="onImageRequested($event)"
        (connectionStarted)="onConnectionStarted($event)"
      />
    }
  </div>

  @if (contextMenu()) {
    <div
      class="fixed z-50 rounded-lg border border-ink-border bg-ink-surface shadow-xl py-1 min-w-44"
      [style.left.px]="contextMenu()!.screenX"
      [style.top.px]="contextMenu()!.screenY"
    >
      <div class="px-3 py-1.5 text-ink-subtle text-xs font-medium uppercase tracking-wide">
        Nueva tarjeta
      </div>

      @for (type of cardTypes; track type) {
        <button
          (click)="onAddCard(type)"
          class="w-full flex items-center gap-2.5 text-left px-4 py-2
                 text-sm text-ink-text hover:bg-ink-border transition-colors">
          {{ typeLabels[type] | transloco }}
        </button>
      }
    </div>
  }
</div>
