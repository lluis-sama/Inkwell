<aside class="flex flex-col w-56 h-full bg-ink-panel border-r border-ink-border shrink-0">

  <!-- Header -->
  <div class="flex items-center justify-between px-3 py-3 border-b border-ink-border shrink-0">
    <span class="text-ink-subtle text-xs font-medium uppercase tracking-widest">
      {{ 'BOARDS.SELECTOR.HEADER' | transloco }}
    </span>
    <button
      (click)="createRequested.emit()"
      [title]="'BOARDS.SELECTOR.NEW_BOARD' | transloco"
      class="p-1 rounded text-ink-subtle hover:text-ink-text hover:bg-ink-surface transition-colors"
    >
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- List -->
  <div class="flex-1 overflow-y-auto py-2 px-1">
    @if (boards().length === 0) {
      <p class="px-3 py-2 text-xs text-ink-subtle">
        {{ 'BOARDS.SELECTOR.EMPTY' | transloco }}
      </p>
    } @else {
      @for (board of boards(); track board.id) {
        <div
          class="group flex items-center gap-2 px-3 py-2 rounded cursor-pointer transition-colors text-sm"
          [class]="activeBoard()?.id === board.id ? 'bg-ink-surface text-ink-text' : 'text-ink-subtle hover:bg-ink-surface hover:text-ink-text'"
          (click)="boardSelected.emit(board)"
        >
          <!-- Grid icon -->
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" class="shrink-0">
            <rect x="1" y="1" width="4.5" height="4.5" rx="0.5" stroke="currentColor" stroke-width="2"/>
            <rect x="7.5" y="1" width="4.5" height="4.5" rx="0.5" stroke="currentColor" stroke-width="2"/>
            <rect x="1" y="7.5" width="4.5" height="4.5" rx="0.5" stroke="currentColor" stroke-width="2"/>
            <rect x="7.5" y="7.5" width="4.5" height="4.5" rx="0.5" stroke="currentColor" stroke-width="2"/>
          </svg>

          <span class="flex-1 truncate">{{ board.title }}</span>

          <!-- Delete button -->
          <button
            (click)="deleteRequested.emit(board.id); $event.stopPropagation()"
            [title]="'BOARDS.SELECTOR.DELETE' | transloco"
            class="p-0.5 rounded text-ink-subtle opacity-0 group-hover:opacity-100 hover:text-ink-danger transition-all"
          >
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      }
    }
  </div>

</aside>
