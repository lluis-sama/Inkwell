<ink-modal [title]="'BOARDS.NEW_BOARD_MODAL.TITLE' | transloco" (closed)="cancelled.emit()">
  <div class="flex flex-col gap-4">
    <!-- Nombre del tablero -->
    <div class="flex flex-col gap-1.5">
      <label class="text-ink-subtle text-xs font-medium uppercase tracking-wide">
        {{ 'BOARDS.NEW_BOARD_MODAL.NAME_LABEL' | transloco }}
      </label>
      <input
        [(ngModel)]="title"
        [placeholder]="'BOARDS.NEW_BOARD_MODAL.NAME_PLACEHOLDER' | transloco"
        maxlength="80"
        (keydown.enter)="create()"
        class="w-full px-3 py-2 rounded bg-ink-bg border border-ink-border text-ink-text text-sm placeholder:text-ink-muted focus:outline-none focus:border-ink-accent transition-colors"
      />
    </div>

    <!-- Error -->
    @if (error()) {
      <p class="text-ink-danger text-xs">{{ error() }}</p>
    }
  </div>

  <!-- Acciones -->
  <ng-container slot="actions">
    <ink-button variant="ghost" (clicked)="cancelled.emit()">
      {{ 'BOARDS.NEW_BOARD_MODAL.CANCEL' | transloco }}
    </ink-button>
    <ink-button
      variant="primary"
      [disabled]="!title.trim()"
      [loading]="creating()"
      (clicked)="create()"
    >
      {{ 'BOARDS.NEW_BOARD_MODAL.CREATE' | transloco }}
    </ink-button>
  </ng-container>
</ink-modal>
