<ink-modal [title]="'BOARDS.CARD_EDITOR_MODAL.TITLE' | transloco" (closed)="cancelled.emit()">
  <div class="flex flex-col gap-4">

    <!-- Título de la tarjeta -->
    <div class="flex flex-col gap-1.5">
      <label class="text-ink-subtle text-xs font-medium uppercase tracking-wide">
        {{ 'BOARDS.CARD_EDITOR_MODAL.TITLE_LABEL' | transloco }}
      </label>
      <input
        [(ngModel)]="editTitle"
        [placeholder]="'BOARDS.CARD_EDITOR_MODAL.TITLE_PLACEHOLDER' | transloco"
        maxlength="100"
        class="w-full px-3 py-2 rounded bg-ink-bg border border-ink-border text-ink-text text-sm placeholder:text-ink-muted focus:outline-none focus:border-ink-accent transition-colors"
      />
    </div>

    <!-- Cuerpo de la tarjeta -->
    <div class="flex flex-col gap-1.5">
      <label class="text-ink-subtle text-xs font-medium uppercase tracking-wide">
        {{ 'BOARDS.CARD_EDITOR_MODAL.BODY_LABEL' | transloco }}
      </label>
      <textarea
        [(ngModel)]="editBody"
        [placeholder]="'BOARDS.CARD_EDITOR_MODAL.BODY_PLACEHOLDER' | transloco"
        rows="6"
        class="w-full px-3 py-2 rounded bg-ink-bg border border-ink-border text-ink-text text-sm placeholder:text-ink-muted focus:outline-none focus:border-ink-accent transition-colors resize-none"
      ></textarea>
    </div>

    <!-- Selector de color -->
    <div class="flex flex-col gap-1.5">
      <label class="text-ink-subtle text-xs font-medium uppercase tracking-wide">
        {{ 'BOARDS.CARD_EDITOR_MODAL.COLOR_LABEL' | transloco }}
      </label>
      <div class="flex gap-2">
        @for (color of colors; track color) {
          <button
            (click)="editColor = color"
            [style.background]="color"
            class="w-7 h-7 rounded-full border-2 transition-all"
            [class]="editColor === color ? 'border-ink-accent scale-110' : 'border-transparent hover:scale-105'"
          ></button>
        }
      </div>
    </div>

  </div>

  <!-- Acciones -->
  <ng-container slot="actions">
    <ink-button variant="ghost" (clicked)="cancelled.emit()">
      {{ 'BOARDS.CARD_EDITOR_MODAL.CANCEL' | transloco }}
    </ink-button>
    <ink-button variant="primary" (clicked)="save()">
      {{ 'BOARDS.CARD_EDITOR_MODAL.SAVE' | transloco }}
    </ink-button>
  </ng-container>
</ink-modal>
