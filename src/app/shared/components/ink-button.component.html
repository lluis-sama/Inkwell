
    <button
      [disabled]="disabled() || loading()"
      [class]="buttonClasses()"
      (click)="clicked.emit()">

      @if (loading()) {
        <span class="inline-block w-4 h-4 border-2 border-current border-t-transparent
                     rounded-full animate-spin mr-2"></span>
      }

      <ng-content />
    </button>
