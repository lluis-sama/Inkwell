<nav class="flex flex-col items-center w-12 h-full bg-ink-panel border-r border-ink-border py-3 gap-1 shrink-0">

  <!-- Logo -->
  <div class="mb-3">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M11 2 L20 19 L11 16 L2 19 Z" fill="var(--ink-accent)" />
    </svg>
  </div>

  <!-- Editor link -->
  <a
    routerLink="/editor"
    [title]="'BOARDS.NAV.EDITOR_TITLE' | transloco"
    class="nav-icon"
    [class.active]="isRoute('/editor')"
  >
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14,2 14,8 20,8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
  </a>

  <!-- Boards link -->
  <a
    routerLink="/boards"
    [title]="'BOARDS.NAV.BOARDS_TITLE' | transloco"
    class="nav-icon"
    [class.active]="isRoute('/boards')"
  >
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="3" width="7" height="7"/>
      <rect x="14" y="3" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/>
    </svg>
  </a>

  <!-- Spacer -->
  <div class="flex-1"></div>

  <!-- Theme toggle -->
  <button
    (click)="theme.toggle()"
    [title]="'BOARDS.NAV.TOGGLE_THEME' | transloco"
    class="nav-icon"
  >
    @if (theme.theme() === 'dark') {
      <!-- Sun icon (shown when dark, switch to light) -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    } @else {
      <!-- Moon icon (shown when light, switch to dark) -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    }
  </button>

</nav>
