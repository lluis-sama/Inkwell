name: Release

on:
  push:
    tags:
      - 'v*'   # Se dispara al hacer push de un tag como v1.0.0

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:

          # Linux x86_64
          - platform: ubuntu-22.04
            args: ''

          # macOS Apple Silicon (M1+)
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'

          # macOS Intel
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

          # Windows x86_64
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Dependencias del sistema — solo Linux
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Inkwell ${{ github.ref_name }}'
          releaseBody: |
            ## Inkwell ${{ github.ref_name }}

            Descarga el instalador para tu sistema:

            - **Linux**: `.deb` (Debian/Ubuntu) o `.AppImage` (universal)
            - **macOS**: `.dmg`
            - **Windows**: `.msi` o `.exe`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}